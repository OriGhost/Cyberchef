name: Deploy CyberChef to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download CyberChef release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p site
          release_json="$(curl -fsSL https://api.github.com/repos/gchq/CyberChef/releases/latest)"
          asset_url="$(
            printf '%s' "$release_json" |
              jq -r '.assets[]
                | select(.name | test("^CyberChef_.*\\.zip$"))
                | .browser_download_url' |
              head -n 1
          )"

          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "Could not find a CyberChef release zip asset." >&2
            exit 1
          fi

          curl -fL "$asset_url" -o cyberchef.zip
          unzip -q cyberchef.zip -d cyberchef-release

          if [ -f cyberchef-release/index.html ]; then
            site_root="cyberchef-release"
          else
            site_root="$(find cyberchef-release -maxdepth 2 -type f -name index.html -printf '%h\n' | head -n 1)"
          fi

          if [ -z "${site_root:-}" ] || [ ! -f "$site_root/index.html" ]; then
            echo "CyberChef release did not contain index.html." >&2
            exit 1
          fi

          cp -a "$site_root"/. site/
          touch site/.nojekyll
          test -f site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
